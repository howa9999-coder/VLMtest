<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel Safety Command | FSS & LSA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
        <!-- Leaflet  -->
     <link rel="stylesheet" href="dist/leaflet/leaflet.css">
     <script src="dist/leaflet/leaflet.js"></script>

</head>
<body>

<header>
    <div class="logo">VLM <span>v01</span>
    </div>
    <div id="vessel-name" style="color: var(--gold)">M/V NORTH STAR</div>
</header>

<div class="main-container">   
    <!-- Map container -->
    <main id="map"> 
        <!-- Full screen btn -->
        <button class="fullscreen-btn" onclick="toggleFullScreen()">
            <svg viewBox="0 0 24 24" class="fullscreen-icon">
                <path d="M7 14H5v5h5v-2H7v-3zm0-4h2V7h3V5H5v5zm10 7h-3v2h5v-5h-2v3zm0-12v3h2V5h-5v2h3z"/>
            </svg>
        </button>
   </main>
    <!-- Sidebar container -->
    <aside class="sidebar">
        <div class="scroll-area">
        <div style="margin-top:20px;">
            <label>SELECT DECK PLAN</label>
            <select id="baselayer-select" ></select>
        </div>
        <div id="checkboxes-container">
        </div>
        <div id="editPanel" class="edit-panel">
            <div id="search-container" style="display: none;">
                <label for="search-input" >SEARCH</label>
                <input type="text" placeholder="Search by labelID" style="font-size: 10px; height: 30px" id="search-input">
            </div>
            <form id="data-form">
                <h6 id="editTitle" style="color:var(--gold); margin-bottom: 10px;">Click on equipment to display data</h6>
            </form>
        </div>
        </div>
    </aside>

</div>

<script src="main.js"></script>
</body>
</html>
